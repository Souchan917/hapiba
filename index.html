<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xxx</title>
    <link rel="stylesheet" href="style.css?v=20260711-1655" />
  </head>
  <body>
    <main class="site-shell">
      <section class="guide" aria-label="案内">
        <img
          class="guide__image"
          src="xxx.webp?v=20260711-1655"
          alt="案内文"
        />
      </section>

      <section class="answer-section" aria-labelledby="answer-title">
        <h1 class="answer-section__title" id="answer-title">ANSWER</h1>
        <form class="answer-form" id="answerForm">
          <div class="code-grid" id="codeGrid" aria-label="15桁の回答入力"></div>
          <button class="judge-button" type="submit">判定</button>
        </form>

      </section>

      <section class="puzzle-list" aria-label="謎解き画像">
        <div class="puzzle-grid" id="puzzleGrid"></div>
      </section>
    </main>

    <div
      class="clear-modal"
      id="clearModal"
      role="dialog"
      aria-modal="true"
      aria-label="正解"
      hidden
    >
      <div class="clear-modal__backdrop" data-close-modal></div>
      <div class="clear-modal__content">
        <button class="clear-modal__close" type="button" id="clearModalClose" aria-label="閉じる">
          ×
        </button>
        <img
          class="clear-modal__image"
          id="clearImage"
          src="clear.webp?v=20260711-1655"
          alt="正解メッセージ"
        />
        <p class="clear-modal__fallback" id="clearFallback" hidden>
          正解です。
        </p>
      </div>
    </div>

    <script src="script.js?v=20260711-1655"></script>
  </body>
</html>
